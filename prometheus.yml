global:
  scrape_interval: 1m

scrape_configs:
  - job_name: 'prometheus'
    scrape_interval: 1m
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'node'
    static_configs:
      - targets: ['node-exporter:9100']

  - job_name: 'producer'
    scrape_interval: 30s
    static_configs:
      - targets: ['producer:8000']

  - job_name: 'worker'
    scrape_interval: 30s
    static_configs:
      - targets: ['worker:8080']
